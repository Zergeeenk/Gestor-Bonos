<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cargas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 32px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 24px;
            text-align: center;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #00c896;
        }

        input::placeholder {
            color: #484f58;
        }

        .field {
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 10px 14px;
            background-color: #00c896;
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #00b383;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            color: #f85149;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .success-msg {
            color: #00c896;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .divider {
            border: none;
            border-top: 1px solid #30363d;
            margin: 24px 0;
        }

        .records-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
        }

        .records-list::-webkit-scrollbar {
            width: 6px;
        }

        .records-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .records-list::-webkit-scrollbar-thumb {
            background-color: #30363d;
            border-radius: 3px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .record-user {
            color: #e6edf3;
            font-weight: 500;
        }

        .record-amount {
            color: #00c896;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #484f58;
            font-size: 0.9rem;
            padding: 20px 0;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-bar h1 {
            margin-bottom: 0;
            text-align: left;
        }

        .btn-logout {
            width: auto;
            padding: 6px 14px;
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .btn-logout:hover {
            color: #f85149;
            border-color: #f85149;
            background-color: transparent;
        }

        #app-view {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN -->
        <div id="login-view">
            <div class="card">
                <h1>Panel de Cargas</h1>
                <div class="field">
                    <label for="access-key">Access Key</label>
                    <input type="password" id="access-key" placeholder="Ingresa tu clave de acceso">
                </div>
                <button id="btn-login">Ingresar</button>
                <div class="error-msg" id="login-error">Clave incorrecta</div>
            </div>
        </div>

        <!-- APP -->
        <div id="app-view">
            <div class="card">
                <div class="header-bar">
                    <h1>Panel de Cargas</h1>
                    <button class="btn-logout" id="btn-logout">Salir</button>
                </div>

                <div class="field">
                    <label for="input-usuario">Usuario</label>
                    <input type="text" id="input-usuario" placeholder="Nombre del usuario">
                </div>
                <div class="field">
                    <label for="input-monto">Monto</label>
                    <input type="number" id="input-monto" placeholder="0.00" step="0.01">
                </div>
                <button id="btn-guardar">Guardar</button>
                <div class="error-msg" id="form-error"></div>
                <div class="success-msg" id="form-success">Registro guardado</div>

                <hr class="divider">

                <h2>Ultimos registros</h2>
                <ul class="records-list" id="records-list">
                    <li class="empty-state">Cargando...</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================================
        // CONFIGURACION - Editar estos valores
        // ============================================================
        const SUPABASE_URL = 'https://ybapmcjydxuzihtfbpuc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rPYIGBIToZwhkuKHpVxgJw_eTjOjhHH';
        const ACCESS_KEY = 'Admin123';
        // ============================================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elementos
        const loginView = document.getElementById('login-view');
        const appView = document.getElementById('app-view');
        const accessKeyInput = document.getElementById('access-key');
        const btnLogin = document.getElementById('btn-login');
        const loginError = document.getElementById('login-error');
        const btnLogout = document.getElementById('btn-logout');
        const inputUsuario = document.getElementById('input-usuario');
        const inputMonto = document.getElementById('input-monto');
        const btnGuardar = document.getElementById('btn-guardar');
        const formError = document.getElementById('form-error');
        const formSuccess = document.getElementById('form-success');
        const recordsList = document.getElementById('records-list');

        // Login
        btnLogin.addEventListener('click', doLogin);
        accessKeyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        function doLogin() {
            loginError.style.display = 'none';
            if (accessKeyInput.value === ACCESS_KEY) {
                loginView.style.display = 'none';
                appView.style.display = 'block';
                loadRecords();
            } else {
                loginError.style.display = 'block';
            }
        }

        // Logout
        btnLogout.addEventListener('click', () => {
            appView.style.display = 'none';
            loginView.style.display = 'block';
            accessKeyInput.value = '';
        });

        // Guardar registro
        btnGuardar.addEventListener('click', saveRecord);
        inputMonto.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') saveRecord();
        });

        async function saveRecord() {
            formError.style.display = 'none';
            formSuccess.style.display = 'none';

            const usuario = inputUsuario.value.trim();
            const monto = parseFloat(inputMonto.value);

            if (!usuario || isNaN(monto)) {
                formError.textContent = 'Completa ambos campos correctamente';
                formError.style.display = 'block';
                return;
            }

            btnGuardar.disabled = true;
            const { error } = await supabase.from('cargas').insert({ usuario, monto });
            btnGuardar.disabled = false;

            if (error) {
                formError.textContent = 'Error al guardar: ' + error.message;
                formError.style.display = 'block';
                return;
            }

            formSuccess.style.display = 'block';
            inputUsuario.value = '';
            inputMonto.value = '';
            inputUsuario.focus();
            setTimeout(() => { formSuccess.style.display = 'none'; }, 2000);
            loadRecords();
        }

        // Cargar registros
        async function loadRecords() {
            const { data, error } = await supabase
                .from('cargas')
                .select('usuario, monto')
                .order('created_at', { ascending: false })
                .limit(50);

            if (error) {
                recordsList.innerHTML = '<li class="empty-state">Error al cargar registros</li>';
                return;
            }

            if (!data || data.length === 0) {
                recordsList.innerHTML = '<li class="empty-state">Sin registros</li>';
                return;
            }

            recordsList.innerHTML = data.map(r =>
                `<li class="record-item">
                    <span class="record-user">${escapeHtml(r.usuario)}</span>
                    <span class="record-amount">$${Number(r.monto).toLocaleString('es-AR', { minimumFractionDigits: 2 })}</span>
                </li>`
            ).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
