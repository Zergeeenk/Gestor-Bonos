<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Bonos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg-base: #06090D;
            --bg-surface: #0B0F16;
            --bg-card: #10161F;
            --bg-card-hover: #141C27;
            --bg-input: #0D1320;
            --border-subtle: rgba(255,255,255,0.05);
            --border-default: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
            --border-glow: rgba(0,230,160,0.18);
            --accent: #00E6A0;
            --accent-dim: rgba(0,230,160,0.12);
            --accent-glow: 0 0 18px rgba(0,230,160,0.22);
            --color-done: #EF4444;
            --color-done-dim: rgba(239,68,68,0.12);
            --text-primary: #EFF2F7;
            --text-secondary: #5A6478;
            --text-muted: #2E3646;
            --font-ui: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 18px;
            --shadow-card: 0 2px 16px rgba(0,0,0,0.5);
            --t: 0.18s cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 40%, rgba(0,230,160,0.03) 0%, transparent 60%);
        }

        ::selection { background: var(--accent-dim); color: var(--accent); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 10px; }

        [data-lucide] { width: 16px; height: 16px; stroke-width: 1.5; vertical-align: middle; flex-shrink: 0; }
        .icon-md { width: 18px; height: 18px; }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        /* ===== LOGIN CARD ===== */
        .login-card {
            background: var(--bg-card);
            border: 0.5px solid var(--border-default);
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: var(--shadow-card);
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .login-card.shake { animation: shake 0.5s ease; }
        .login-card.success-glow {
            border-color: var(--border-glow);
            box-shadow: var(--accent-glow), var(--shadow-card);
        }
        .login-card.exit { animation: card-exit 0.4s ease forwards; }

        .login-logo {
            width: 56px; height: 56px;
            margin: 0 auto 20px;
            background: var(--accent-dim);
            border-radius: var(--r-lg);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            animation: card-enter 0.5s ease both;
        }
        .login-logo svg { fill: var(--accent); }
        .login-logo.error-state { background: var(--color-done-dim); }
        .login-logo.error-state svg { fill: var(--color-done); }
        .login-logo.success-state { background: var(--accent-dim); transform: scale(1.08); }

        .login-title {
            font-family: var(--font-mono);
            font-size: 16px;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 4px;
            animation: card-enter 0.5s ease both;
            animation-delay: 80ms;
        }
        .login-title .bold { font-weight: 700; color: var(--text-primary); }
        .login-title .light { font-weight: 400; color: var(--text-secondary); }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 28px;
            transition: color 0.3s;
            animation: card-enter 0.5s ease both;
            animation-delay: 140ms;
        }
        .login-subtitle.error-text { color: var(--color-done); }
        .login-subtitle.success-text { color: var(--accent); }

        .login-form {
            animation: card-enter 0.5s ease both;
            animation-delay: 200ms;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }
        .input-group .field-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); pointer-events: none;
        }
        .input-group input {
            width: 100%;
            padding: 13px 46px 13px 42px;
            background: var(--bg-input);
            border: 0.5px solid var(--border-default);
            border-radius: var(--r-md);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 14px;
            outline: none;
            transition: border-color var(--t), box-shadow var(--t);
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .input-group input::placeholder { color: var(--text-muted); }
        .input-group input.input-error {
            border-color: var(--color-done);
            box-shadow: 0 0 0 3px var(--color-done-dim);
        }
        .input-group input.input-success {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        .toggle-pass {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 4px;
            color: var(--text-muted); display: flex; align-items: center;
            transition: color var(--t);
        }
        .toggle-pass:hover { color: var(--text-secondary); }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: var(--bg-base);
            border: none;
            border-radius: var(--r-md);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all var(--t);
        }
        .btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-footer {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 24px;
            animation: card-enter 0.5s ease both;
            animation-delay: 260ms;
        }

        /* ===== APP ===== */
        #app-view {
            display: none;
            opacity: 0;
            transform: translateY(20px);
        }
        #app-view.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        .app-card {
            background: var(--bg-card);
            border: 0.5px solid var(--border-default);
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow-card);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .app-title {
            font-family: var(--font-mono);
            font-size: 14px;
            letter-spacing: 0.08em;
        }
        .app-title .bold { font-weight: 700; }
        .app-title .light { font-weight: 400; color: var(--text-secondary); }

        .btn-logout {
            background: none;
            border: 0.5px solid var(--border-default);
            border-radius: var(--r-sm);
            color: var(--text-secondary);
            padding: 6px 12px;
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: all var(--t);
        }
        .btn-logout:hover { color: var(--color-done); border-color: var(--color-done); }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 0.5px solid var(--border-default);
            border-radius: var(--r-sm);
            color: var(--text-primary);
            font-family: var(--font-ui);
            font-size: 13px;
            outline: none;
            transition: border-color var(--t), box-shadow var(--t);
        }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .field input::placeholder { color: var(--text-muted); }

        .btn-save {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: var(--bg-base);
            border: none;
            border-radius: var(--r-sm);
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all var(--t);
        }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-save:active { transform: translateY(0); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .feedback {
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            border-radius: var(--r-sm);
            display: none;
            animation: slide-up 0.2s ease;
        }
        .feedback.error { color: var(--color-done); background: var(--color-done-dim); display: block; }
        .feedback.success { color: var(--accent); background: var(--accent-dim); display: block; }

        .divider {
            border: none;
            border-top: 0.5px solid var(--border-subtle);
            margin: 24px 0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
        }

        .records-list {
            list-style: none;
            max-height: 340px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 0.5px solid var(--border-subtle);
            border-radius: var(--r-md);
            margin-bottom: 6px;
            transition: all var(--t);
        }
        .record-item:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }
        .record-user {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .record-amount {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 28px 0;
        }

        @keyframes card-enter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes card-exit {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-30px); }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            10%,50%,90% { transform: translateX(-5px); }
            30%,70% { transform: translateX(5px); }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN -->
        <div id="login-view">
            <div class="login-card" id="login-card">
                <div class="login-logo" id="login-logo">
                    <svg width="24" height="24" viewBox="0 0 32 32">
                        <rect x="0" y="0" width="14" height="8" rx="2" opacity="0.9"/>
                        <rect x="18" y="0" width="14" height="8" rx="2" opacity="0.5"/>
                        <rect x="0" y="12" width="14" height="8" rx="2" opacity="0.6"/>
                        <rect x="18" y="12" width="14" height="8" rx="2" opacity="0.9"/>
                        <rect x="0" y="24" width="14" height="8" rx="2" opacity="0.4"/>
                        <rect x="18" y="24" width="14" height="8" rx="2" opacity="0.7"/>
                    </svg>
                </div>
                <div class="login-title">
                    <span class="bold">GESTOR</span> <span class="light">BONOS</span>
                </div>
                <div class="login-subtitle" id="login-subtitle">Ingresa tu clave de acceso</div>

                <div class="login-form">
                    <div class="input-group">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="access-key" placeholder="Access Key" autocomplete="off">
                        <button class="toggle-pass" id="toggle-pass" type="button" tabindex="-1">
                            <i data-lucide="eye" id="eye-icon"></i>
                        </button>
                    </div>
                    <button class="btn-login" id="btn-login">
                        <i data-lucide="log-in" class="icon-md"></i>
                        <span id="btn-login-text">Ingresar</span>
                    </button>
                </div>

                <div class="login-footer">Gestor Bonos v1.0</div>
            </div>
        </div>

        <!-- APP -->
        <div id="app-view">
            <div class="app-card">
                <div class="app-header">
                    <div class="app-title">
                        <span class="bold">GESTOR</span> <span class="light">BONOS</span>
                    </div>
                    <button class="btn-logout" id="btn-logout">
                        <i data-lucide="log-out"></i>
                        Salir
                    </button>
                </div>

                <div class="field">
                    <label>Usuario</label>
                    <input type="text" id="input-usuario" placeholder="Nombre del usuario">
                </div>
                <div class="field">
                    <label>Monto</label>
                    <input type="number" id="input-monto" placeholder="0.00" step="0.01">
                </div>
                <button class="btn-save" id="btn-guardar">
                    <i data-lucide="save"></i>
                    Guardar
                </button>
                <div class="feedback" id="form-feedback"></div>

                <hr class="divider">

                <div class="section-title">Ultimos registros</div>
                <ul class="records-list" id="records-list">
                    <li class="empty-state">Cargando...</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================================
        // CONFIGURACION
        // ============================================================
        const SUPABASE_URL = 'https://ybapmcjydxuzihtfbpuc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rPYIGBIToZwhkuKHpVxgJw_eTjOjhHH';
        const ACCESS_KEY = 'Admin123';
        // ============================================================

        let supabase;
        try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
        catch(e) { console.error('Supabase init error:', e); }

        try { lucide.createIcons(); } catch(e) { console.error('Lucide init error:', e); }

        const loginView = document.getElementById('login-view');
        const loginCard = document.getElementById('login-card');
        const loginLogo = document.getElementById('login-logo');
        const loginSubtitle = document.getElementById('login-subtitle');
        const accessKeyInput = document.getElementById('access-key');
        const btnLogin = document.getElementById('btn-login');
        const btnLoginText = document.getElementById('btn-login-text');
        const togglePass = document.getElementById('toggle-pass');
        const eyeIcon = document.getElementById('eye-icon');
        const appView = document.getElementById('app-view');
        const btnLogout = document.getElementById('btn-logout');
        const inputUsuario = document.getElementById('input-usuario');
        const inputMonto = document.getElementById('input-monto');
        const btnGuardar = document.getElementById('btn-guardar');
        const formFeedback = document.getElementById('form-feedback');
        const recordsList = document.getElementById('records-list');

        // Toggle password visibility
        togglePass.addEventListener('click', () => {
            const isPass = accessKeyInput.type === 'password';
            accessKeyInput.type = isPass ? 'text' : 'password';
            eyeIcon.setAttribute('data-lucide', isPass ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        // Reset on typing
        accessKeyInput.addEventListener('input', () => {
            accessKeyInput.classList.remove('input-error', 'input-success');
            loginLogo.classList.remove('error-state', 'success-state');
            loginSubtitle.classList.remove('error-text', 'success-text');
            loginSubtitle.textContent = 'Ingresa tu clave de acceso';
        });

        // Login
        btnLogin.addEventListener('click', doLogin);
        accessKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        function doLogin() {
            if (btnLogin.disabled) return;

            if (accessKeyInput.value === ACCESS_KEY) {
                accessKeyInput.classList.remove('input-error');
                accessKeyInput.classList.add('input-success');
                loginLogo.classList.remove('error-state');
                loginLogo.classList.add('success-state');
                loginSubtitle.classList.remove('error-text');
                loginSubtitle.classList.add('success-text');
                loginSubtitle.textContent = 'Acceso autorizado';
                btnLogin.disabled = true;
                btnLoginText.textContent = 'Acceso autorizado';
                btnLogin.querySelector('[data-lucide]').setAttribute('data-lucide', 'check');
                lucide.createIcons();
                loginCard.classList.add('success-glow');

                setTimeout(() => loginCard.classList.add('exit'), 600);
                setTimeout(() => {
                    loginView.style.display = 'none';
                    appView.style.display = 'block';
                    requestAnimationFrame(() => requestAnimationFrame(() => appView.classList.add('visible')));
                    lucide.createIcons();
                    loadRecords();
                }, 1000);
            } else {
                accessKeyInput.classList.remove('input-success');
                accessKeyInput.classList.add('input-error');
                loginLogo.classList.remove('success-state');
                loginLogo.classList.add('error-state');
                loginSubtitle.classList.remove('success-text');
                loginSubtitle.classList.add('error-text');
                loginSubtitle.textContent = 'Clave incorrecta';
                loginCard.classList.remove('shake');
                void loginCard.offsetWidth;
                loginCard.classList.add('shake');
                accessKeyInput.select();
            }
        }

        // Logout
        btnLogout.addEventListener('click', () => {
            appView.classList.remove('visible');
            setTimeout(() => {
                appView.style.display = 'none';
                loginView.style.display = 'block';
                loginCard.classList.remove('exit', 'success-glow');
                loginLogo.classList.remove('success-state', 'error-state');
                loginSubtitle.classList.remove('success-text', 'error-text');
                loginSubtitle.textContent = 'Ingresa tu clave de acceso';
                accessKeyInput.classList.remove('input-success', 'input-error');
                accessKeyInput.value = '';
                accessKeyInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
                btnLogin.disabled = false;
                btnLoginText.textContent = 'Ingresar';
                btnLogin.querySelector('[data-lucide]').setAttribute('data-lucide', 'log-in');
                lucide.createIcons();
            }, 300);
        });

        // Save
        btnGuardar.addEventListener('click', saveRecord);
        inputMonto.addEventListener('keydown', e => { if (e.key === 'Enter') saveRecord(); });

        function showFeedback(msg, type) {
            formFeedback.textContent = msg;
            formFeedback.className = 'feedback ' + type;
            if (type === 'success') setTimeout(() => { formFeedback.className = 'feedback'; }, 2500);
        }

        async function saveRecord() {
            formFeedback.className = 'feedback';
            const usuario = inputUsuario.value.trim();
            const monto = parseFloat(inputMonto.value);

            if (!usuario || isNaN(monto)) {
                showFeedback('Completa ambos campos correctamente', 'error');
                return;
            }

            btnGuardar.disabled = true;
            const { error } = await supabase.from('cargas').insert({ usuario, monto });
            btnGuardar.disabled = false;

            if (error) {
                showFeedback('Error: ' + error.message, 'error');
                return;
            }

            showFeedback('Registro guardado', 'success');
            inputUsuario.value = '';
            inputMonto.value = '';
            inputUsuario.focus();
            loadRecords();
        }

        // Load records
        async function loadRecords() {
            const { data, error } = await supabase
                .from('cargas')
                .select('usuario, monto')
                .order('created_at', { ascending: false })
                .limit(50);

            if (error) {
                recordsList.innerHTML = '<li class="empty-state">Error al cargar registros</li>';
                return;
            }
            if (!data || data.length === 0) {
                recordsList.innerHTML = '<li class="empty-state">Sin registros</li>';
                return;
            }
            recordsList.innerHTML = data.map(r => `
                <li class="record-item">
                    <span class="record-user">${escHtml(r.usuario)}</span>
                    <span class="record-amount">$${Number(r.monto).toLocaleString('es-AR', { minimumFractionDigits: 2 })}</span>
                </li>
            `).join('');
        }

        function escHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
    </script>
</body>
</html>
